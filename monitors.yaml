# ---------------------------------------------------------------------------
# Your monitored servers, as code.
#
# Edit this file, then apply it with:
#   docker compose run --rm provisioner
#
# The provisioner matches on `name`: a monitor that already exists is updated
# in place, a new name is created. Nothing is deleted automatically.
#
# Common types and their fields:
#   http  -> url
#   port  -> hostname, port        (raw TCP connect check)
#   ping  -> hostname              (ICMP ping)
#   dns   -> hostname              (DNS resolution)
#   docker-> docker_container, docker_host   (needs the docker.sock mount)
#
# `interval` is seconds between checks. See the README for more fields.
# ---------------------------------------------------------------------------

- name: Blackcoat
  type: http
  url: https://blackcoat.co.uk
  interval: 60

- name: Tillec
  type: http
  url: https://tillec.co.uk/
  interval: 60

- name: BuildQS App
  type: http
  url: https://app.buildqs.com/
  interval: 60

- name: HTFC Hub
  type: http
  url: https://hub.htfc.co.uk/login
  interval: 60
