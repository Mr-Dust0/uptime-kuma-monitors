services:
  uptime-kuma:
    # Pinned to 1.23.2: the provisioner's uptime-kuma-api library supports
    # 1.21.3-1.23.2 only. Kuma 2.x changed the Socket.IO API and is NOT yet
    # supported (https://github.com/lucasheld/uptime-kuma-api/issues/74).
    image: louislam/uptime-kuma:1.23.2
    restart: always
    # No host port publishing and no container_name: Dokploy's Traefik reaches
    # the service over dokploy-network, and container_name breaks Dokploy
    # logs/metrics. Access is via the Domain you configured in Dokploy.
    networks:
      - default            # internal: lets the provisioner reach this service
      - dokploy-network    # external: lets Dokploy's Traefik route the domain
    labels:
      # Tell Traefik which network to use to reach this container (required
      # when the service is attached to more than one network).
      - traefik.docker.network=dokploy-network
    volumes:
      - uptime-kuma-data:/app/data
      # Only needed for the "Docker Container" monitor type. Mounting the
      # Docker socket gives this container root-equivalent control of the
      # host, so remove this line if you don't monitor containers.
      - /var/run/docker.sock:/var/run/docker.sock

  # One-shot sidecar: reads monitors.yaml and pushes each entry into
  # Uptime Kuma via its API, then exits. Re-run any time you edit the file:
  #   docker compose run --rm provisioner
  # Stays on the default network only, so it reaches Kuma at uptime-kuma:3001.
  provisioner:
    build: ./provisioner
    depends_on:
      - uptime-kuma
    environment:
      KUMA_URL: "http://uptime-kuma:3001"
      # Credentials for the Kuma admin account. On the very first run the
      # provisioner creates this account; afterwards it logs in with it.
      KUMA_USERNAME: "${KUMA_USERNAME:-admin}"
      KUMA_PASSWORD: "${KUMA_PASSWORD:?Set KUMA_PASSWORD in a .env file}"
    volumes:
      - ./monitors.yaml:/app/monitors.yaml:ro
    restart: "no"

networks:
  # Dokploy creates this network; we attach to it so Traefik can route traffic.
  dokploy-network:
    external: true

volumes:
  uptime-kuma-data:
